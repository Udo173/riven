<!DOCTYPE html>
<html>
<head>
  <title>Billi Reader</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 40px auto; padding: 20px; }
    h2 { color: #1a1a2e; }
    .buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
    button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .upload { background: #4a90d9; color: white; }
    .paste { background: #2d2d2d; color: white; }
    .send { background: #f59e0b; color: white; }
    .send.ready { background: #22c55e; }
    .clear { background: #ef4444; color: white; }
    .editor { border: 1px solid #e5e5e5; border-radius: 8px; overflow: hidden; }
    .header { background: #f5f5f5; padding: 8px 12px; font-size: 12px; color: #666; border-bottom: 1px solid #e5e5e5; }
    textarea { width: 100%; min-height: 350px; padding: 12px; border: none; resize: vertical; font-family: monospace; font-size: 13px; line-height: 1.6; box-sizing: border-box; }
    .path { font-size: 12px; color: #888; margin-top: 10px; }
    .status { padding: 10px; background: #dcfce7; color: #166534; border-radius: 8px; margin-bottom: 15px; display: none; }
    .status.show { display: block; }
  </style>
</head>
<body>
  <h2>Billi Reader - Obsidian Bridge</h2>
  
  <div id="status" class="status"></div>
  
  <div class="buttons">
    <button class="upload" onclick="document.getElementById('file').click()">Upload BILLI_TO_CLAUDE.md</button>
    <button class="paste" onclick="pasteFromClipboard()">Paste from Clipboard</button>
    <button class="send" id="sendBtn" onclick="sendToClaude()">Copy for Claude</button>
    <button class="clear" onclick="clearContent()">Clear</button>
  </div>
  
  <input type="file" id="file" accept=".md,.txt" onchange="handleFile(event)" style="display:none">
  
  <div class="editor">
    <div class="header">BILLI_TO_CLAUDE.md Content</div>
    <textarea id="content" placeholder="Upload or paste BILLI_TO_CLAUDE.md content here..."></textarea>
  </div>
  
  <p class="path">Path: C:\claude\Udo-Vault\Topics\Agent-Bridge\BILLI_TO_CLAUDE.md</p>

  <script>
    const BILLI_PATH = 'C:\\claude\\Udo-Vault\\Topics\\Agent-Bridge\\BILLI_TO_CLAUDE.md';
    
    function handleFile(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          document.getElementById('content').value = ev.target.result;
          updateSendBtn();
        };
        reader.readAsText(file);
      }
    }
    
    function pasteFromClipboard() {
      navigator.clipboard.readText().then(text => {
        document.getElementById('content').value = text;
        updateSendBtn();
      });
    }
    
    function updateSendBtn() {
      const btn = document.getElementById('sendBtn');
      btn.classList.toggle('ready', document.getElementById('content').value.trim().length > 0);
    }
    
    function sendToClaude() {
      const content = document.getElementById('content').value;
      if (content.trim()) {
        navigator.clipboard.writeText(content).then(() => {
          showStatus('Copied! Paste to Claude');
        });
      }
    }
    
    function clearContent() {
      document.getElementById('content').value = '';
      document.getElementById('status').classList.remove('show');
      updateSendBtn();
    }
    
    function showStatus(msg) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3000);
    }
    
    document.getElementById('content').addEventListener('input', updateSendBtn);
  </script>
</body>
</html>
